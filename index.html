<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; padding-bottom: 40px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .gender-icon {
            width: 30px; height: 30px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 18px;
        }
        .small-header { font-size: 0.8rem; font-weight: bold; color: #2c3e50; }
        .text-muted-custom { color: #5a6782; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container-fluid mt-3">
    <div class="row g-3">
        <div class="col-md-5">
            <div class="card p-3">
                <h6 class="small-header mb-4">DEMOGRAPHIC</h6>
                <p class="text-muted-custom fw-bold mb-3">Gender</p>
                
                <div class="row align-items-center mb-4">
                    <div class="col-5">
                        <div id="gender-pie"></div>
                    </div>
                    <div class="col-7 ps-3">
                        <div class="d-flex align-items-center mb-3">
                            <span class="fw-bold text-muted me-3" style="width:20px">F</span>
                            <div class="gender-icon me-2" style="border: 2px solid #f1aed544; color: #f1aed5; background: #f1aed511;">♀</div>
                            <div>
                                <div class="fw-bold" style="line-height:1.1">46.8%</div>
                                <div class="text-muted" style="font-size:11px">(36 users)</div>
                            </div>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <span class="fw-bold text-muted me-3" style="width:20px">M</span>
                            <div class="gender-icon me-2" style="border: 2px solid #9ec5f744; color: #9ec5f7; background: #9ec5f711;">♂</div>
                            <div>
                                <div class="fw-bold" style="line-height:1.1">39.0%</div>
                                <div class="text-muted" style="font-size:11px">(30 users)</div>
                            </div>
                        </div>
                        <div class="d-flex align-items-center">
                            <span class="fw-bold text-muted me-3" style="width:20px">NB</span>
                            <div class="gender-icon me-2" style="border: 2px solid #d1e7dd44; color: #d1e7dd; background: #d1e7dd11;">⚧</div>
                            <div>
                                <div class="fw-bold" style="line-height:1.1">14.3%</div>
                                <div class="text-muted" style="font-size:11px">(11 users)</div>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="text-muted-custom fw-bold mb-1">Age</p>
                <div id="age-bar"></div>

                <p class="text-muted-custom fw-bold mt-4">Country (where users are coming from)</p>
                <div id="country-bar"></div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-3">
                <h6 class="small-header mb-2">MONTHLY CHURN RATE</h6>
                <div id="churn-line"></div>
                
                <h6 class="small-header mt-4 mb-2">COHORT RETENTION</h6>
                <div id="retention-heatmap"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DATA ---
    const COLORS = { female: "#f1aed5", male: "#9ec5f7", nb: "#d1e7dd", theme: "#a361a5" };

    // 1. Gender Pie
    Plotly.newPlot('gender-pie', [{
        values: [36, 30, 11],
        labels: ['F', 'M', 'NB'],
        type: 'pie',
        hole: 0.78,
        showlegend: false,
        marker: { colors: [COLORS.female, COLORS.male, COLORS.nb] }
    }], {
        height: 180, margin: {t:10,b:10,l:10,r:10},
        annotations: [{ text: 'Total<br><span style="font-size:20px; color:#2c3e50">77</span>', x:0.5, y:0.5, showarrow:false }]
    }, {displayModeBar: false});

    // 2. Age Bar
    Plotly.newPlot('age-bar', [{
        x: ["18-24", "25-34", "35-44", "45-54", "55+"],
        y: [12, 21, 23, 11, 10],
        type: 'bar',
        text: [12, 21, 23, 11, 10],
        textposition: 'outside',
        marker: { color: COLORS.theme },
        width: 0.4
    }], {
        height: 150, margin: {t:30,b:20,l:0,r:0},
        xaxis: { showgrid: false },
        yaxis: { visible: false },
        plot_bgcolor: 'rgba(0,0,0,0)', paper_bgcolor: 'rgba(0,0,0,0)'
    }, {displayModeBar: false});

    // 3. Country Bar
    const countries = ["Denmark", "Finland", "Portugal", "Belgium", "Norway", "Netherlands", "Poland", "Sweden", "Switzerland", "Austria", "Spain", "France", "Italy", "Germany", "UK"];
    const countryVals = [1, 1, 1, 3, 3, 4, 4, 4, 4, 5, 6, 7, 8, 13, 13];
    Plotly.newPlot('country-bar', [{
        x: countryVals,
        y: countries,
        type: 'bar',
        orientation: 'h',
        text: countryVals.map(v => `<b>${(v/77*100).toFixed(1)}%</b> (${v})`),
        textposition: 'outside',
        marker: { color: COLORS.theme },
        width: 0.6
    }], {
        height: 400, margin: {t:10,b:10,l:100,r:80},
        xaxis: { visible: false },
        yaxis: { showgrid: false, tickfont: {size: 11} },
        plot_bgcolor: 'rgba(0,0,0,0)', paper_bgcolor: 'rgba(0,0,0,0)'
    }, {displayModeBar: false});

    // 4. Churn Line
    const months = ["J", "F", "M", "A", "M", "J", "J", "A", "S", "O", "N", "D"];
    Plotly.newPlot('churn-line', [
        { x: months, y: [25, 28, 24, 26, 22, 25, 24, 27, 25, 30, 24, 26], name: 'Base', mode: 'lines+markers', line: {color: COLORS.female, width:3} },
        { x: months, y: [15, 16, 14, 15, 14, 16, 15, 17, 16, 18, 17, 12], name: 'Premium', mode: 'lines+markers', line: {color: COLORS.theme, width:3} }
    ], {
        height: 220, margin: {t:30,b:30,l:30,r:20},
        legend: { orientation: 'h', x: 1, y: 1.1, xanchor: 'right' },
        xaxis: { showgrid: false }, yaxis: { showgrid: false }
    }, {displayModeBar: false});

    // 5. Retention Heatmap
    const zData = [
        [100, 93.4, 75.0, 59.5, 48.1, 40.8, 33.5, 30.1, 27.2, 23.7, 19.3, 17.4],
        [100, 89.3, 68.0, 55.2, 44.1, 35.2, 28.8, 23.5, 19.9, 18.9, 16.7, null]
        // Add other rows as needed following your matrix pattern
    ];
    const yLabels = ["J 316", "F 281", "M 312", "A 320", "M 360", "J 351", "J 386", "A 366", "S 385", "O 421", "N 388", "D 435"];
    
    Plotly.newPlot('retention-heatmap', [{
        z: zData,
        x: Array.from({length: 12}, (_, i) => i.toString()),
        y: yLabels,
        type: 'heatmap',
        colorscale: [[0, "#fcf7fc"], [1, COLORS.theme]],
        showscale: false,
        text: zData.map(row => row.map(v => v ? v + '%' : '')),
        texttemplate: "%{text}",
        xgap: 1, ygap: 1
    }], {
        height: 350, margin: {t:30,b:10,l:50,r:20},
        yaxis: { autorange: 'reversed', tickfont: {size:10} },
        xaxis: { side: 'top' }
    }, {displayModeBar: false});
</script>

</body>
</html>
